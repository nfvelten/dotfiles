# Daily note — scratchpad (special workspace), abre flutuante ao pressionar Super+N
windowrule = workspace special:daily-note silent, match:class ^daily-note$
windowrule = float on, match:class ^daily-note$
windowrule = size 900 650, match:class ^daily-note$
windowrule = center on, match:class ^daily-note$
windowrule = animation slide, match:class ^daily-note$

# Super key hint — float bottom-right, abre ao pressionar Super+Slash
windowrule = float on, match:class ^superkey-hint$
windowrule = size 640 480, match:class ^superkey-hint$
windowrule = move (monitor_w-window_w-20) (monitor_h-window_h-20), match:class ^superkey-hint$
windowrule = animation popin, match:class ^superkey-hint$
windowrule = no_blur on, match:class ^superkey-hint$

# Claude Code — scratchpad (special workspace), abre flutuante ao pressionar Super+C
windowrule = workspace special:claude-amphora silent, match:class ^claude-amphora$
windowrule = float on, match:class ^claude-amphora$
windowrule = size 1100 640, match:class ^claude-amphora$
windowrule = center on, match:class ^claude-amphora$
windowrule = animation slide, match:class ^claude-amphora$
