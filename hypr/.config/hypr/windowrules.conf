# Walker launcher
layerrule = blur on, match:namespace walker
layerrule = no_anim off, match:namespace walker
layerrule = animation fade, match:namespace walker



# Spotify player — scratchpad (Super+M)
windowrule = workspace special:spotify silent, match:class ^spotify-player$
windowrule = float on, match:class ^spotify-player$
windowrule = size 1100 650, match:class ^spotify-player$
windowrule = center on, match:class ^spotify-player$
windowrule = animation slide, match:class ^spotify-player$


# Claude Code — scratchpad (special workspace), abre flutuante ao pressionar Super+C
windowrule = workspace special:claude-amphora silent, match:class ^claude-amphora$
windowrule = float on, match:class ^claude-amphora$
windowrule = size 1100 640, match:class ^claude-amphora$
windowrule = center on, match:class ^claude-amphora$
windowrule = animation slide, match:class ^claude-amphora$
