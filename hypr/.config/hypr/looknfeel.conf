# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 6
    gaps_out = 12

    col.active_border = rgba(a67c52ee) rgba(d4a574ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Use master layout instead of dwindle
    # layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.85

    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.15
    }

    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = rgba(a67c52bb)
        color_inactive = rgba(00000044)
    }
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smooth, 0.4, 0.0, 0.2, 1.0

    animation = windows, 1, 4, overshot, slide
    animation = windowsIn, 1, 4, overshot, slide
    animation = windowsOut, 1, 3, smooth, slide
    animation = workspaces, 1, 5, smooth, slidefadevert 25
    animation = specialWorkspace, 1, 6, smooth, slidefadevert 25
    animation = layers, 1, 4, smooth, fade
}
