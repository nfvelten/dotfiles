# Super key hint — aparece ao pressionar Super, some ao soltar
bind = SUPER, super_l, exec, pgrep -f superkey-hint > /dev/null || uwsm app -- alacritty --class superkey-hint -e bash -c "$HOME/.local/bin/superkey-hint"
bind = SUPER, super_r, exec, pgrep -f superkey-hint > /dev/null || uwsm app -- alacritty --class superkey-hint -e bash -c "$HOME/.local/bin/superkey-hint"
bindl = SUPER, super_l, exec, hyprctl dispatch closewindow class:superkey-hint
bindl = SUPER, super_r, exec, hyprctl dispatch closewindow class:superkey-hint

# Daily note scratchpad (Super+N)
bindd = SUPER, N, Daily Note, exec, uwsm app -- $HOME/.local/bin/daily-note

# Claude Code scratchpad (Super+C)
bindd = SUPER, C, Claude, exec, uwsm app -- $HOME/.local/bin/claude-amphora

# Meeting recorder (Super+R) — inicia/para gravação e transcreve
bindd = SUPER, R, Meeting Record, exec, uwsm app -- $HOME/.local/bin/meeting-record

# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER, B, LibreWolf, exec, omarchy-launch-or-focus librewolf "uwsm app -- librewolf"
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus signal "uwsm app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, slash, Passwords, exec, uwsm app -- 1password

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Volume over 100% (max 150%) — unbind defaults first to avoid conflict
unbind = ,XF86AudioRaiseVolume
unbind = ,XF86AudioLowerVolume
unbind = ALT, XF86AudioRaiseVolume
unbind = ALT, XF86AudioLowerVolume
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, $osdclient --output-volume raise --max-volume 150
bindeld = ,XF86AudioLowerVolume, Volume down, exec, $osdclient --output-volume lower --max-volume 150
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, $osdclient --output-volume +1 --max-volume 150
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, $osdclient --output-volume -1 --max-volume 150

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER SHIFT, SPACE
# bindd = SUPER SHIFT, SPACE, Omarchy menu, exec, omarchy-menu
